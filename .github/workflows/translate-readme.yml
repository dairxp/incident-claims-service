name: Translate README

on:
  push:
    paths:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Translate README.md to English
        uses: ephraimduncan/translate-readme@main
        with:
          LANG: en

      - name: Commit translated README
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs: update README.en.md from README.md'
          file_pattern: README.en.md